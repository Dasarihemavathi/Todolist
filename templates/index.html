<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yash To-Do List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Link to CSS in static folder -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg todo-card">

      <div class="card-body">
        <h2>📝 My To-Do List</h2>

        <!-- Add Task Form -->
        <form action="/add" method="POST" class="d-flex mb-4">
          <input type="text" name="task" class="form-control me-2" placeholder="Enter a new task..." required>
          <button type="submit" class="btn btn-success">Add</button>
        </form>

        <!-- Task List -->
        <ul class="list-group">
          {% for task in tasks %}
            <li class="list-group-item fade-in">
              <span>{{ task }}</span>
              <a href="/delete/{{ loop.index0 }}" class="btn btn-outline-danger btn-sm">Delete</a>
            </li>
          {% else %}
            <p class="text-center text-muted mt-3">No tasks yet! Add one ✨</p>
          {% endfor %}
        </ul>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
